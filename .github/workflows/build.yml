name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Installa dipendenze di sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Installa Buildozer e Cython
        run: |
          pip3 install --upgrade pip
          pip3 install --upgrade buildozer cython virtualenv

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-

      - name: Compila APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: Carica APK come artefatto
        uses: actions/upload-artifact@v4
        with:
          name: manga-downloader-apk
          path: bin/*.apk

      - name: Carica log in caso di errore
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
